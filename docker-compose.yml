version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishing-detection-api
    ports:
      - "8000:8000"
    volumes:
      - ./training/models:/app/training/models
      - ./backend/logs:/app/backend/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
